services:
  - type: web
    name: maxlinify-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: BROWSER_POOL_SIZE
        value: "2"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
